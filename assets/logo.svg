<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Claw / pincer — centered top area -->
  <g transform="translate(64, 38)" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left pincer arm -->
    <path d="M-6,0 Q-28,-28 -18,-40 Q-10,-36 -4,-14" fill="#f0abfc" opacity="0.95"/>
    <!-- Right pincer arm -->
    <path d="M6,0 Q28,-28 18,-40 Q10,-36 4,-14" fill="#f0abfc" opacity="0.95"/>
    <!-- Joint circle -->
    <circle cx="0" cy="4" r="7" fill="#e879f9" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- Terminal prompt >_ -->
  <text x="20" y="100" font-family="SF Mono, Menlo, Consolas, monospace" font-size="42" font-weight="bold" fill="#fbbf24" opacity="0.95">&gt;_</text>
</svg>
